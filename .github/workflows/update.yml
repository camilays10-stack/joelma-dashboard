name: Atualizar Métricas

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests rich urllib3 --quiet

      - name: Coletar dados
        run: python verificador.py
        continue-on-error: true
        timeout-minutes: 4

      - name: Commit métricas
        run: |
          git config user.name "Joelma Analytics Bot"
          git config user.email "bot@joelma-analytics.com"
          git add historico_metricas.json
          git diff --cached --quiet || git commit -m "auto: métricas $(date +'%d/%m %H:%M UTC')"
          git push
